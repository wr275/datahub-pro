version: '3.9'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: datahub_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: datahub_pro
      POSTGRES_USER: datahub
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_in_production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datahub -d datahub_pro"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (for caching & job queues - future use)
  redis:
    image: redis:7-alpine
    container_name: datahub_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: datahub_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://datahub:${DB_PASSWORD:-changeme_in_production}@db:5432/datahub_pro
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-in-production}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_placeholder}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_placeholder}
      STRIPE_STARTER_PRICE_ID: ${STRIPE_STARTER_PRICE_ID:-price_starter}
      STRIPE_GROWTH_PRICE_ID: ${STRIPE_GROWTH_PRICE_ID:-price_growth}
      STRIPE_ENTERPRISE_PRICE_ID: ${STRIPE_ENTERPRISE_PRICE_ID:-price_enterprise}
      STORAGE_TYPE: local
      LOCAL_UPLOAD_DIR: /app/uploads
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    volumes:
      - upload_data:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # React Frontend (built and served by nginx)
  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: datahub_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8000

  # Nginx Reverse Proxy (production)
  nginx:
    image: nginx:alpine
    container_name: datahub_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    profiles:
      - production

volumes:
  postgres_data:
    driver: local
  upload_data:
    driver: local
  nginx_logs:
    driver: local
